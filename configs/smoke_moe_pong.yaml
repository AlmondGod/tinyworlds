# Smoke test: MoE + Muon on PONG (500 steps per stage)
use_wandb: true
wandb_project: tinyworlds-moe-muon-pr

dataset: PONG
preload_ratio: 0.01

# shared model
patch_size: 4
context_length: 4
frame_size: 64
latent_dim: 5
num_bins: 4
n_actions: 4

# override all stages to 500 steps
n_updates: 500
log_interval: 250

# perf (compile off for smoke)
amp: true
tf32: true
compile: false

# single GPU
distributed:
  use_ddp: false
  use_fsdp: false
nproc_per_node: 1
standalone: true

# MoE + Muon
optimizer: "muon"
use_moe: true
num_experts: 4
top_k_experts: 2
moe_aux_loss_coeff: 0.01

# stage configs
video_tokenizer_config: configs/video_tokenizer.yaml
latent_actions_config: configs/latent_actions.yaml
dynamics_config: configs/dynamics.yaml
run_video_tokenizer: true
run_latent_actions: true
run_dynamics: true
